<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="720" height="480" fill="#ffffff" rx="8" stroke="#d0d7de" stroke-width="1"/>

  <!-- PR Header bar -->
  <rect width="720" height="52" fill="#f6f8fa" rx="8"/>
  <rect y="8" width="720" height="44" fill="#f6f8fa"/>
  <rect y="52" width="720" height="1" fill="#d0d7de"/>

  <!-- PR title row -->
  <text x="16" y="32" font-size="16" font-weight="600" fill="#1f2328">feat: add authentication middleware to 8 API routes</text>
  <rect x="576" y="16" width="48" height="22" rx="11" fill="#dafbe1" stroke="#aceebb" stroke-width="1"/>
  <text x="600" y="31" font-size="12" font-weight="500" fill="#1a7f37" text-anchor="middle">Open</text>
  <rect x="630" y="16" width="76" height="22" rx="11" fill="#f0f0f0" stroke="#d0d7de" stroke-width="1"/>
  <text x="668" y="31" font-size="12" fill="#57606a" text-anchor="middle">Closes #29</text>

  <!-- Author line -->
  <circle cx="28" cy="70" r="10" fill="#d1d5da"/>
  <text x="44" y="75" font-size="12" fill="#57606a">kody-bot</text>
  <text x="100" y="75" font-size="12" fill="#57606a">wants to merge 3 commits into</text>
  <rect x="248" y="62" width="60" height="18" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="278" y="75" font-size="11" fill="#57606a" text-anchor="middle">main</text>
  <text x="318" y="75" font-size="12" fill="#57606a">from</text>
