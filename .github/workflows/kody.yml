name: kody

on:
  workflow_dispatch:
    inputs:
      task_id:
        required: true
        type: string
      mode:
        type: string
        default: "full"
      from_stage:
        type: string
        default: ""
      issue_number:
        type: string
        default: ""
      feedback:
        type: string
        default: ""
      dry_run:
        type: boolean
        default: false
      use_test_config:
        type: boolean
        default: false

  issue_comment:
    types: [created]

  pull_request_review:
    types: [submitted]

  push:
    branches: [main, dev]
    paths: ["src/**", "prompts/**", "package.json"]

concurrency:
  group: kody-${{ github.event.inputs.task_id || github.event.issue.number || github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: write

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  # ─── Parse (issue_comment trigger only) ──────────────────────────────────────
  parse:
    if: >-
      github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, '@kody') || contains(github.event.comment.body, '/kody'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      task_id: ${{ steps.parse.outputs.task_id }}
      mode: ${{ steps.parse.outputs.mode }}
      from_stage: ${{ steps.parse.outputs.from_stage }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      feedback: ${{ steps.parse.outputs.feedback }}
      valid: ${{ steps.parse.outputs.valid }}
      trigger_type: ${{ steps.parse.outputs.trigger_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: src/ci
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate author
        id: safety
        env:
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
        run: npx tsx src/ci/parse-safety.ts

      - name: Add reaction
        if: steps.safety.outputs.valid == 'true'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            })

      - name: Parse inputs
        if: steps.safety.outputs.valid == 'true'
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          TRIGGER_TYPE: comment
        run: npx tsx src/ci/parse-inputs.ts

  # ─── Orchestrate ─────────────────────────────────────────────────────────────
  orchestrate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && needs.parse.outputs.valid == 'true') ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested')
    needs: [parse]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.email "${GIT_USER_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
          git config user.name "${GIT_USER_NAME:-github-actions[bot]}"

      - name: Run Kody pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_ID: ${{ github.event.inputs.task_id || needs.parse.outputs.task_id }}
          MODE: ${{ github.event.inputs.mode || needs.parse.outputs.mode || 'full' }}
          FROM_STAGE: ${{ github.event.inputs.from_stage || needs.parse.outputs.from_stage }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || needs.parse.outputs.issue_number }}
          FEEDBACK: ${{ github.event.inputs.feedback || needs.parse.outputs.feedback }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: pnpm kody

      - name: Pipeline summary
        if: always()
        run: |
          TASK_ID="${{ github.event.inputs.task_id || needs.parse.outputs.task_id }}"
          if [ -f ".tasks/${TASK_ID}/status.json" ]; then
            echo "## Pipeline Status" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat ".tasks/${TASK_ID}/status.json" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kody-tasks-${{ github.event.inputs.task_id || needs.parse.outputs.task_id }}
          path: .tasks/
          retention-days: 7

  # ─── Error Notifications ─────────────────────────────────────────────────────
  notify-parse-error:
    if: >-
      github.event_name == 'issue_comment' &&
      needs.parse.outputs.valid != 'true' &&
      (contains(github.event.comment.body, '@kody') || contains(github.event.comment.body, '/kody'))
    needs: [parse]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Failed to parse command.\n\nUsage: `@kody [full|rerun|status] <task-id> [--from <stage>] [--feedback "<text>"]`'
            })

  notify-orchestrate-error:
    if: failure() && needs.orchestrate.result == 'failure'
    needs: [orchestrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ github.event.inputs.issue_number || needs.parse.outputs.issue_number || '0' }};
            if (issueNumber > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ Pipeline failed. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }

  # ─── Smoke Test (push trigger) ──────────────────────────────────────────────
  smoke-test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm kody --help
